server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /planner {
        auth_basic "APURI Private Access";
        auth_basic_user_file /run/secrets/htpasswd;
        return 302 /planner/;
    }

    location /planner/ {
        auth_basic "APURI Private Access";
        auth_basic_user_file /run/secrets/htpasswd;
        alias /usr/share/nginx/html/protected/planner/;
        index index.html;
    }

    location = /stormbot {
        auth_basic "APURI Private Access";
        auth_basic_user_file /run/secrets/htpasswd;
        return 302 /stormbot/;
    }

    location /stormbot/ {
        auth_basic "APURI Private Access";
        auth_basic_user_file /run/secrets/htpasswd;
        alias /usr/share/nginx/html/protected/stormbot/;
        index index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
