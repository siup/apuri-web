<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stormbot — APURI</title>
  <style>
    :root {
      --bg: #07080d;
      --text: #f3f5f7;
      --muted: #a4adba;
      --glow-b: #7a8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at 80% 20%, rgba(122,140,255,.14), transparent 35%), #07080d;
      color: var(--text);
      padding: 24px;
    }
    main {
      max-width: 520px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 32px;
      background: rgba(255,255,255,.05);
    }
    .tag {
      display: inline-block;
      color: var(--glow-b);
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 12px; font-size: 32px; letter-spacing: -.04em; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    a { color: var(--glow-b); }
  </style>
</head>
<body>
  <main>
    <div class="tag">Chroniony obszar</div>
    <h1>Stormbot</h1>
    <p>Placeholder chronionej strefy. Wkrótce podłączony zostanie właściwy system automatyzacji. <a href="/">← Powrót na stronę główną</a></p>
  </main>
</body>
</html>
